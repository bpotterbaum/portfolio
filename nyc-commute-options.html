<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>NYC Commute Regions</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <style>
    :root {
      --text:    #111827;
      --sub:     #6b7280;
      --border:  #e5e7eb;
      --surface: #f9fafb;
      --safe-b:  env(safe-area-inset-bottom, 0px);
    }
    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      margin: 0; height: 100%; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      color: var(--text);
    }
    .app { position: relative; height: 100dvh; }

    /* ── Map ──────────────────────────────────────────────────────── */
    #map { position: absolute; inset: 0; z-index: 0; }

    /* ── FABs ─────────────────────────────────────────────────────── */
    .fabs {
      position: absolute;
      right: 14px;
      z-index: 50;
      display: flex;
      flex-direction: column;
      gap: 8px;
      /* bottom set by JS */
    }
    .fab {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #fff;
      border: none;
      box-shadow: 0 2px 10px rgba(0,0,0,.18);
      display: grid;
      place-items: center;
      font-size: 17px;
      cursor: pointer;
      color: #374151;
      transition: background .1s;
    }
    .fab:active { background: #f3f4f6; }

    /* ── Bottom Sheet ─────────────────────────────────────────────── */
    .sheet {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      z-index: 100;
      background: #fff;
      border-radius: 18px 18px 0 0;
      box-shadow: 0 -4px 24px rgba(0,0,0,.09), 0 -1px 4px rgba(0,0,0,.05);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      /* height set by JS */
      will-change: height;
    }

    /* ── Handle ───────────────────────────────────────────────────── */
    .handle-zone {
      padding: 10px 0 8px;
      cursor: ns-resize;
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      user-select: none;
    }
    .handle {
      width: 34px; height: 4px;
      border-radius: 2px;
      background: #d1d5db;
    }

    /* ── Filter tabs ──────────────────────────────────────────────── */
    .filter-row {
      display: flex;
      gap: 4px;
      padding: 0 14px 10px;
      flex-shrink: 0;
    }
    .filter-tab {
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: .02em;
      padding: 5px 12px;
      border-radius: 16px;
      border: none;
      background: var(--surface);
      color: var(--sub);
      cursor: pointer;
      transition: background .12s, color .12s;
    }
    .filter-tab.active { background: #111827; color: #fff; }

    /* ── Region switcher ──────────────────────────────────────────── */
    .region-scroll {
      display: flex;
      gap: 7px;
      padding: 0 14px 12px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .region-scroll::-webkit-scrollbar { display: none; }
    .region-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 11px 7px 9px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: #fff;
      color: var(--sub);
      font-size: 12.5px;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      transition: border-color .12s, color .12s, background .12s;
      flex-shrink: 0;
    }
    .region-chip .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .region-chip.active {
      background: #fff;
      color: var(--text);
      font-weight: 600;
    }

    /* ── Sheet body ───────────────────────────────────────────────── */
    .sheet-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 14px 16px calc(14px + var(--safe-b));
      overscroll-behavior: contain;
    }

    /* ── Region detail ────────────────────────────────────────────── */
    .detail-tier {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: .09em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .detail-name {
      font-size: 19px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--text);
      margin: 0 0 5px;
    }
    .detail-summary {
      font-size: 13.5px;
      color: var(--sub);
      line-height: 1.5;
      margin: 0 0 12px;
    }

    /* ── Signal badges ────────────────────────────────────────────── */
    .signals {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 14px;
    }
    .signal {
      font-size: 11.5px;
      font-weight: 500;
      padding: 4px 9px;
      border-radius: 6px;
      background: var(--surface);
      color: var(--sub);
      border: 1px solid var(--border);
    }
    .signal.good    { background: #ecfdf5; border-color: #a7f3d0; color: #065f46; }
    .signal.caution { background: #fffbeb; border-color: #fde68a; color: #92400e; }
    .signal.info    { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }

    /* ── Actions ──────────────────────────────────────────────────── */
    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .action-btn {
      display: flex;
      flex-direction: column;
      padding: 12px 13px;
      border-radius: 12px;
      text-decoration: none;
      transition: opacity .1s;
    }
    .action-btn:active { opacity: .8; }
    .action-btn.primary {
      background: #111827;
      color: #fff;
    }
    .action-btn.secondary {
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text);
    }
    .action-icon  { font-size: 15px; margin-bottom: 5px; }
    .action-label { font-size: 12.5px; font-weight: 600; line-height: 1.2; margin-bottom: 3px; }
    .action-sub   { font-size: 11px; line-height: 1.3; }
    .action-btn.primary .action-sub  { color: rgba(255,255,255,.6); }
    .action-btn.secondary .action-sub { color: var(--sub); }

    /* ── Fact rows ────────────────────────────────────────────────── */
    .fact-list {
      border: 1px solid var(--border);
      border-radius: 13px;
      overflow: hidden;
      margin-bottom: 16px;
      background: #fff;
    }
    .fact-row {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 10px;
      padding: 11px 14px;
      border-top: 1px solid var(--border);
      align-items: start;
    }
    .fact-row:first-child { border-top: none; }
    .fact-key {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--sub);
      padding-top: 1px;
    }
    .fact-val {
      font-size: 13px;
      line-height: 1.5;
      color: var(--text);
    }

    /* ── Why list ─────────────────────────────────────────────────── */
    .why-head {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--sub);
      margin-bottom: 8px;
    }
    .why-list {
      list-style: none;
      padding: 0; margin: 0;
      display: grid;
      gap: 7px;
    }
    .why-list li {
      font-size: 13px;
      line-height: 1.5;
      color: var(--text);
      padding-left: 16px;
      position: relative;
    }
    .why-list li::before {
      content: '→';
      position: absolute;
      left: 0;
      font-size: 11px;
      color: var(--sub);
      top: 2px;
    }

    /* ── Leaflet overrides ────────────────────────────────────────── */
    .leaflet-control-attribution {
      font-size: 9px !important;
      background: rgba(255,255,255,.75) !important;
    }
    .leaflet-top.leaflet-right { top: 14px; right: 14px; }
    .leaflet-control-zoom a {
      width: 32px !important;
      height: 32px !important;
      line-height: 32px !important;
    }
  </style>
</head>
<body>
<div class="app">
  <div id="map"></div>

}).addTo(map);

// ─── State ─────────────────────────────────────────────────────────────────

let activeId     = 'nj-midtown-direct';
const mapLayers  = {};

// ─── Build map layers ──────────────────────────────────────────────────────
REGIONS.forEach(r => {
  const circle = L.circle([r.hub.lat, r.hub.lng], {
    radius: r.radiusMiles * 1609.34,
    color: r.color, fillColor: r.color,
    fillOpacity: .12, weight: 2, opacity: .5,
    interactive: true,
  });

  const hubIcon = L.divIcon({
    html: `<div style="
      width:11px;height:11px;border-radius:50%;
      background:${r.color};border:2.5px solid #fff;
      box-shadow:0 1px 5px rgba(0,0,0,.3)

    className: '',
    iconSize: [11, 11],
    iconAnchor: [5.5, 5.5],
  });
  const hub = L.marker([r.hub.lat, r.hub.lng], { icon: hubIcon })
    .bindTooltip(r.hub.label, { direction: 'top', offset: [0, -8] });

  const group = L.featureGroup([circle, hub]).addTo(map);
  circle.on('click', () => selectRegion(r.id, true));
  hub.on('click',    () => selectRegion(r.id, true));
  mapLayers[r.id] = { group, circle, hub };
});

// ─── Filter helpers ────────────────────────────────────────────────────────

  if (activeFilter === 'ground') return REGIONS.filter(r => r.type === 'ground');
  if (activeFilter === 'flight') return REGIONS.filter(r => r.type === 'flight');
  return REGIONS;
}

// ─── Render: filter tabs ───────────────────────────────────────────────────
function renderFilters() {
  const el = document.getElementById('filterRow');
  el.innerHTML = '';
  FILTERS.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'filter-tab' + (f.id === activeFilter ? ' active' : '');
    btn.textContent = f.label;
    btn.onclick = () => {
      activeFilter = f.id;
      renderFilters();
      renderRegionSwitcher();
      updateMapVisibility();
      const vis = filteredRegions();
      if (!vis.find(r => r.id === activeId)) selectRegion(vis[0]?.id);
    };
    el.appendChild(btn);
  });
}

// ─── Render: region switcher ───────────────────────────────────────────────
function renderRegionSwitcher() {
  const el = document.getElementById('regionScroll');
  el.innerHTML = '';
  filteredRegions().forEach(r => {
    const chip = document.createElement('button');
    chip.className = 'region-chip' + (r.id === activeId ? ' active' : '');
    chip.innerHTML = `<span class="dot" style="background:${r.color}"></span>${r.shortName}`;
    if (r.id === activeId) {
      chip.style.borderColor = r.color;
      chip.style.color = r.color;
    }
    chip.onclick = () => selectRegion(r.id, true);
    el.appendChild(chip);
  });

  // Scroll active chip into view
  const active = el.querySelector('.active');
  if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'nearest', block: 'nearest' });
}

// ─── Map visibility ────────────────────────────────────────────────────────
function updateMapVisibility() {
  const visIds = new Set(filteredRegions().map(r => r.id));
  Object.entries(mapLayers).forEach(([id, { group }]) => {
    if (visIds.has(id)) group.addTo(map); else group.remove();
  });
}

// ─── Select region ─────────────────────────────────────────────────────────
function selectRegion(id, fitMap = false) {
  const r = REGIONS.find(x => x.id === id);
  if (!r) return;
  activeId = id;

  // Refresh switcher
  renderRegionSwitcher();

  // Update circle styles
  Object.entries(mapLayers).forEach(([rid, { circle }]) => {
    circle.setStyle(rid === id
      ? { fillOpacity: .22, weight: 2.5, opacity: .8 }
      : { fillOpacity: .10, weight: 1.5, opacity: .4 }
    );
  });

  if (fitMap) {
    map.fitBounds(mapLayers[id].group.getBounds(), { padding: [60, 60], maxZoom: 10 });
  }

  // Tier + name + summary
  const tierEl = document.getElementById('detailTier');
  tierEl.textContent = r.tier;
  tierEl.style.color = r.color;
  document.getElementById('detailName').textContent    = r.name;
  document.getElementById('detailSummary').textContent = r.summary;

  // Signals
  document.getElementById('detailSignals').innerHTML = r.signals
    .map(s => `<span class="signal ${s.cls}">${s.text}</span>`)
    .join('');

  // Action buttons
  document.getElementById('detailActions').innerHTML = r.links.map((link, i) => `
    <a class="action-btn ${i === 0 ? 'primary' : 'secondary'}"
       href="${link.url}" target="_blank" rel="noopener noreferrer">
      <span class="action-icon">${i === 0 ? '🏠' : '🔍'}</span>
      <span class="action-label">${link.label}</span>
      <span class="action-sub">${link.note}</span>
    </a>
  `).join('');

  // Facts
  document.getElementById('detailFacts').innerHTML = r.facts
    .map(([k, v]) => `
      <div class="fact-row">
        <span class="fact-key">${k}</span>
        <span class="fact-val">${v}</span>
      </div>
    `).join('');

  // Why
  document.getElementById('detailWhy').innerHTML = r.why
    .map(x => `<li>${x}</li>`)
    .join('');
}

// ─── Sheet drag / snap ─────────────────────────────────────────────────────
const sheet      = document.getElementById('sheet');
const handleZone = document.getElementById('handleZone');
const fabsEl     = document.getElementById('fabs');

const SHEET_COMPACT  = 310;
const getSheetExpanded = () => Math.min(Math.round(window.innerHeight * 0.6), 680);

let sheetH    = SHEET_COMPACT;
let dragging  = false;
let dragStartY = 0;
let dragStartH = 0;

function applySheetHeight(h, animate = false) {
  const min = 180;
  const max = getSheetExpanded();
  h = Math.max(min, Math.min(max, h));
  sheetH = h;
  sheet.style.transition = animate ? 'height .28s cubic-bezier(.4,0,.2,1)' : 'none';
  sheet.style.height = h + 'px';
  fabsEl.style.bottom = (h + 12) + 'px';
}

function snapSheet() {
  const mid = (SHEET_COMPACT + getSheetExpanded()) / 2;
  applySheetHeight(sheetH > mid ? getSheetExpanded() : SHEET_COMPACT, true);
}

handleZone.addEventListener('touchstart', e => {
  dragging   = true;
  dragStartY = e.touches[0].clientY;
  dragStartH = sheetH;
  sheet.style.transition = 'none';
}, { passive: true });

window.addEventListener('touchmove', e => {
  if (!dragging) return;
  const dy = dragStartY - e.touches[0].clientY;
  applySheetHeight(dragStartH + dy);
}, { passive: true });

window.addEventListener('touchend', () => {
  if (!dragging) return;
  dragging = false;
  snapSheet();
});

// Click handle to toggle
handleZone.addEventListener('click', () => {
  const mid = (SHEET_COMPACT + getSheetExpanded()) / 2;
  applySheetHeight(sheetH > mid ? SHEET_COMPACT : getSheetExpanded(), true);
});

// ─── Reset button ──────────────────────────────────────────────────────────
document.getElementById('resetBtn').onclick = () => {
  map.setView([40.8, -74.2], 7);
};

// ─── Init ──────────────────────────────────────────────────────────────────
renderFilters();
renderRegionSwitcher();
applySheetHeight(SHEET_COMPACT);
selectRegion('nj-midtown-direct', true);
</script>
