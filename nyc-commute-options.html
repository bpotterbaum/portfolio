<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>NYC Commute Regions</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <style>
    :root {
      --text: #111827;
      --sub: #6b7280;
      --border: #e5e7eb;
      --surface: #f9fafb;
      --safe-b: env(safe-area-inset-bottom, 0px);
    }
    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      color: var(--text);
    }
    .app { position: relative; height: 100dvh; }
    #map { position: absolute; inset: 0; z-index: 0; }

    .fabs {
      position: absolute;
      right: 14px;
      z-index: 50;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .fab {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #fff;
      border: none;
      box-shadow: 0 2px 10px rgba(0,0,0,.18);
      display: grid;
      place-items: center;
      font-size: 17px;
      cursor: pointer;
      color: #374151;
      transition: background .1s;
    }
    .fab:active { background: #f3f4f6; }

    .sheet {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 100;
      background: #fff;
      border-radius: 18px 18px 0 0;
      box-shadow: 0 -4px 24px rgba(0,0,0,.09), 0 -1px 4px rgba(0,0,0,.05);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      will-change: height;
    }

    .handle-zone {
      padding: 10px 0 8px;
      cursor: ns-resize;
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      user-select: none;
    }
    .handle {
      width: 34px;
      height: 4px;
      border-radius: 2px;
      background: #d1d5db;
    }

    .filter-row {
      display: flex;
      gap: 4px;
      padding: 0 14px 10px;
      flex-shrink: 0;
    }
    .filter-tab {
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: .02em;
      padding: 5px 12px;
      border-radius: 16px;
      border: none;
      background: var(--surface);
      color: var(--sub);
      cursor: pointer;
      transition: background .12s, color .12s;
    }
    .filter-tab.active { background: #111827; color: #fff; }

    .region-scroll {
      display: flex;
      gap: 7px;
      padding: 0 14px 12px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .region-scroll::-webkit-scrollbar { display: none; }
    .region-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 11px 7px 9px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: #fff;
      color: var(--sub);
      font-size: 12.5px;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      transition: border-color .12s, color .12s, background .12s;
      flex-shrink: 0;
    }
    .region-chip .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .region-chip.active {
      background: #fff;
      color: var(--text);
      font-weight: 600;
    }

    .sheet-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 14px 16px calc(14px + var(--safe-b));
      overscroll-behavior: contain;
    }

    .detail-tier {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: .09em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .detail-name {
      font-size: 19px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--text);
      margin: 0 0 5px;
    }
    .detail-summary {
      font-size: 13.5px;
      color: var(--sub);
      line-height: 1.5;
      margin: 0 0 12px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }
    .meta-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 11px;
      background: #fff;
    }
    .meta-label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--sub);
      margin-bottom: 4px;
    }
    .meta-value {
      display: block;
      font-size: 13px;
      line-height: 1.4;
      color: var(--text);
    }
    .meta-value.subtle { color: var(--sub); }

    .signals {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 14px;
    }
    .signal {
      font-size: 11.5px;
      font-weight: 500;
      padding: 4px 9px;
      border-radius: 6px;
      background: var(--surface);
      color: var(--sub);
      border: 1px solid var(--border);
    }
    .signal.good { background: #ecfdf5; border-color: #a7f3d0; color: #065f46; }
    .signal.caution { background: #fffbeb; border-color: #fde68a; color: #92400e; }
    .signal.info { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .action-btn {
      display: flex;
      flex-direction: column;
      padding: 12px 13px;
      border-radius: 12px;
      text-decoration: none;
      transition: opacity .1s;
    }
    .action-btn:active { opacity: .8; }
    .action-btn.primary {
      background: #111827;
      color: #fff;
    }
    .action-btn.secondary {
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text);
    }
    .action-icon { font-size: 15px; margin-bottom: 5px; }
    .action-label { font-size: 12.5px; font-weight: 600; line-height: 1.2; margin-bottom: 3px; }
    .action-sub { font-size: 11px; line-height: 1.3; }
    .action-btn.primary .action-sub { color: rgba(255,255,255,.6); }
    .action-btn.secondary .action-sub { color: var(--sub); }

    .section-head {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--sub);
      margin-bottom: 8px;
    }

    .fact-list {
      border: 1px solid var(--border);
      border-radius: 13px;
      overflow: hidden;
      margin-bottom: 16px;
      background: #fff;
    }
    .fact-row {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 10px;
      padding: 11px 14px;
      border-top: 1px solid var(--border);
      align-items: start;
    }
    .fact-row:first-child { border-top: none; }
    .fact-key {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--sub);
      padding-top: 1px;
    }
    .fact-val {
      font-size: 13px;
      line-height: 1.5;
      color: var(--text);
    }

    .town-list {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }
    .town-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 12px;
      background: #fff;
    }
    .town-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
      align-items: baseline;
    }
    .town-name {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text);
    }
    .town-tag {
      font-size: 10.5px;
      font-weight: 600;
      color: var(--sub);
      background: var(--surface);
      border-radius: 999px;
      padding: 3px 7px;
      white-space: nowrap;
    }
    .town-note {
      font-size: 12px;
      line-height: 1.45;
      color: var(--sub);
      margin: 0;
    }

    .why-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 7px;
    }
    .why-list li {
      font-size: 13px;
      line-height: 1.5;
      color: var(--text);
      padding-left: 16px;
      position: relative;
    }
    .why-list li::before {
      content: '→';
      position: absolute;
      left: 0;
      font-size: 11px;
      color: var(--sub);
      top: 2px;
    }

    .leaflet-control-attribution {
      font-size: 9px !important;
      background: rgba(255,255,255,.75) !important;
    }
    .leaflet-top.leaflet-right { top: 14px; right: 14px; }
    .leaflet-control-zoom a {
      width: 32px !important;
      height: 32px !important;
      line-height: 32px !important;
    }

    @media (max-width: 420px) {
      .meta-grid,
      .action-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

const HUB_TYPES = Object.fromEntries(Object.entries(HUB_TYPE_META).map(([key, meta]) => [key, meta.label]));

REGIONS.forEach((region) => {
  const primaryHubType = region.hub.kind || region.hub.type || region.hubs?.[0]?.type || 'rail';
  region.hub.type = primaryHubType;
  region.commute = region.commute || {
    pattern: region.type === 'ground' ? 'Ground access' : 'Fly-in access',
    doorToDesk: region.doorToDesk?.value || 'Placeholder',
    notes: region.doorToDesk?.note || 'Door-to-desk placeholder pending.',
  };
  region.stats = region.stats || {
    hubType: HUB_TYPES[primaryHubType] || primaryHubType,
    townCount: (region.towns || []).length,
  };
  region.towns = (region.towns || []).map((town) => ({
    tag: town.tag || ((primaryHubType === 'airport' || primaryHubType === 'ferry') ? 'Submarket' : 'Rail town'),
    ...town,
  }));
});

  { id: 'all', label: 'All' },
  { id: 'ground', label: 'Ground' },
  { id: 'flight', label: 'Fly-in' },
];

const map = L.map('map', { zoomControl: false }).setView([40.8, -74.2], 7);

  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

L.control.zoom({ position: 'topright' }).addTo(map);

  html: `<div style="
    width:14px;height:14px;border-radius:50%;
    background:#1d4ed8;border:2.5px solid #fff;
    box-shadow:0 1px 6px rgba(0,0,0,.35)
  "></div>`,
  className: '',
  iconSize: [14, 14],
  iconAnchor: [7, 7],
});
L.marker(OFFICE, { icon: officeIcon, zIndexOffset: 1000 })
  .addTo(map)
  .bindTooltip(OFFICE_LABEL, { permanent: false, direction: 'top', offset: [0, -10] });

let activeFilter = 'all';
let activeId = REGIONS[0]?.id || null;
const mapLayers = {};

REGIONS.forEach((region) => {
  const circle = L.circle([region.hub.lat, region.hub.lng], {
    radius: region.radiusMiles * 1609.34,
    color: region.color,
    fillColor: region.color,
    fillOpacity: .12,
    weight: 2,
    opacity: .5,
    interactive: true,
  });

  const hubIcon = L.divIcon({
    html: `<div style="
      width:11px;height:11px;border-radius:50%;
      background:${region.color};border:2.5px solid #fff;
      box-shadow:0 1px 5px rgba(0,0,0,.3)
    "></div>`,
    className: '',
    iconSize: [11, 11],
    iconAnchor: [5.5, 5.5],
  });

  const hub = L.marker([region.hub.lat, region.hub.lng], { icon: hubIcon })
    .bindTooltip(`${region.hub.label} · ${HUB_TYPES[region.hub.type]}`, { direction: 'top', offset: [0, -8] });

  const group = L.featureGroup([circle, hub]).addTo(map);
  circle.on('click', () => selectRegion(region.id, true));
  hub.on('click', () => selectRegion(region.id, true));
  mapLayers[region.id] = { group, circle, hub };
});

function filteredRegions() {
  if (activeFilter === 'ground') return REGIONS.filter((r) => r.type === 'ground');
  if (activeFilter === 'flight') return REGIONS.filter((r) => r.type === 'flight');
  return REGIONS;
}

function renderFilters() {
  const el = document.getElementById('filterRow');
  el.innerHTML = '';
  FILTERS.forEach((filter) => {
    const btn = document.createElement('button');
    btn.className = 'filter-tab' + (filter.id === activeFilter ? ' active' : '');
    btn.textContent = filter.label;
    btn.onclick = () => {
      activeFilter = filter.id;
      renderFilters();
      renderRegionSwitcher();
      updateMapVisibility();
      const visible = filteredRegions();
      if (!visible.find((region) => region.id === activeId)) selectRegion(visible[0]?.id);
    };
    el.appendChild(btn);
  });
}

function renderRegionSwitcher() {
  const el = document.getElementById('regionScroll');
  el.innerHTML = '';
  filteredRegions().forEach((region) => {
    const chip = document.createElement('button');
    chip.className = 'region-chip' + (region.id === activeId ? ' active' : '');
    chip.innerHTML = `<span class="dot" style="background:${region.color}"></span>${region.shortName}`;
    if (region.id === activeId) {
      chip.style.borderColor = region.color;
      chip.style.color = region.color;
    }
    chip.onclick = () => selectRegion(region.id, true);
    el.appendChild(chip);
  });

  const active = el.querySelector('.active');
  if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'nearest', block: 'nearest' });
}

function updateMapVisibility() {
  const visibleIds = new Set(filteredRegions().map((region) => region.id));
  Object.entries(mapLayers).forEach(([id, { group }]) => {
    if (visibleIds.has(id)) group.addTo(map);
    else group.remove();
  });
}

function renderMeta(region) {
  const meta = [
    { label: 'Commute lane', value: region.commute.pattern },
    { label: 'Hub', value: `${region.hub.label} · ${region.stats.hubType}` },
    { label: 'Door to desk', value: region.commute.doorToDesk, subtle: /placeholder/i.test(region.commute.doorToDesk) },
    { label: 'Town set', value: `${region.stats.townCount} candidate ${region.stats.townCount === 1 ? 'town' : 'towns'}` },
  ];

  document.getElementById('detailMeta').innerHTML = meta.map((item) => `
    <div class="meta-card">
      <span class="meta-label">${item.label}</span>
      <span class="meta-value${item.subtle ? ' subtle' : ''}">${item.value}</span>
    </div>
  `).join('');
}

function renderActions(region) {
  document.getElementById('detailActions').innerHTML = region.links.map((link, index) => `
    <a class="action-btn ${index === 0 ? 'primary' : 'secondary'}"
       href="${link.url}" target="_blank" rel="noopener noreferrer">
      <span class="action-icon">${index === 0 ? '🏠' : '🔍'}</span>
      <span class="action-label">${link.label}</span>
      <span class="action-sub">${link.note}</span>
    </a>
  `).join('');
}

function renderFacts(region) {
  const rows = [
    ['Hub notes', region.commute.notes],
    ...region.facts,
  ];
  document.getElementById('detailFacts').innerHTML = rows.map(([key, val]) => `
    <div class="fact-row">
      <span class="fact-key">${key}</span>
      <span class="fact-val">${val}</span>
    </div>
  `).join('');
}

function renderTowns(region) {
  document.getElementById('detailTowns').innerHTML = region.towns.map((town) => `
    <div class="town-card">
      <div class="town-top">
        <span class="town-name">${town.name}</span>
        <span class="town-tag">${town.tag}</span>
      </div>
      <p class="town-note">${town.note}</p>
    </div>
  `).join('');
}

function selectRegion(id, fitMap = false) {
  const region = REGIONS.find((entry) => entry.id === id);
  if (!region) return;
  activeId = id;

  renderRegionSwitcher();

  Object.entries(mapLayers).forEach(([regionId, { circle }]) => {
    circle.setStyle(regionId === id
      ? { fillOpacity: .22, weight: 2.5, opacity: .8 }
      : { fillOpacity: .10, weight: 1.5, opacity: .4 });
  });

  if (fitMap) {
    map.fitBounds(mapLayers[id].group.getBounds(), { padding: [60, 60], maxZoom: 10 });
  }

  const tierEl = document.getElementById('detailTier');
  tierEl.textContent = region.tier;
  tierEl.style.color = region.color;
  document.getElementById('detailName').textContent = region.name;
  document.getElementById('detailSummary').textContent = region.summary;
  renderMeta(region);
  document.getElementById('detailSignals').innerHTML = region.signals
    .map((signal) => `<span class="signal ${signal.cls}">${signal.text}</span>`)
    .join('');
  renderActions(region);
  renderFacts(region);
  renderTowns(region);
  document.getElementById('detailWhy').innerHTML = region.why.map((item) => `<li>${item}</li>`).join('');
}

const sheet = document.getElementById('sheet');
const handleZone = document.getElementById('handleZone');
const fabsEl = document.getElementById('fabs');

const SHEET_COMPACT = 360;
const getSheetExpanded = () => Math.min(Math.round(window.innerHeight * 0.72), 820);

let sheetH = SHEET_COMPACT;
let dragging = false;
let dragStartY = 0;
let dragStartH = 0;

function applySheetHeight(height, animate = false) {
  const min = 220;
  const max = getSheetExpanded();
  const clamped = Math.max(min, Math.min(max, height));
  sheetH = clamped;
  sheet.style.transition = animate ? 'height .28s cubic-bezier(.4,0,.2,1)' : 'none';
  sheet.style.height = clamped + 'px';
  fabsEl.style.bottom = (clamped + 12) + 'px';
}

function snapSheet() {
  const mid = (SHEET_COMPACT + getSheetExpanded()) / 2;
  applySheetHeight(sheetH > mid ? getSheetExpanded() : SHEET_COMPACT, true);
}

handleZone.addEventListener('touchstart', (event) => {
  dragging = true;
  dragStartY = event.touches[0].clientY;
  dragStartH = sheetH;
  sheet.style.transition = 'none';
}, { passive: true });

window.addEventListener('touchmove', (event) => {
  if (!dragging) return;
  const dy = dragStartY - event.touches[0].clientY;
  applySheetHeight(dragStartH + dy);
}, { passive: true });

window.addEventListener('touchend', () => {
  if (!dragging) return;
  dragging = false;
  snapSheet();
});

handleZone.addEventListener('click', () => {
  const mid = (SHEET_COMPACT + getSheetExpanded()) / 2;
  applySheetHeight(sheetH > mid ? SHEET_COMPACT : getSheetExpanded(), true);
});

document.getElementById('resetBtn').onclick = () => {
  map.setView([40.8, -74.2], 7);
};

renderFilters();
renderRegionSwitcher();
applySheetHeight(SHEET_COMPACT);
if (activeId) selectRegion(activeId, true);
</script>
