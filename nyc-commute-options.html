<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>NYC Commute Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <style>
    :root {
      --bg: #f2f4f7;
      --sheet: rgba(255,255,255,.98);
      --border: rgba(15,23,42,.08);
      --text: #101828;
      --muted: #667085;
      --blue: #2e90fa;
      --green: #12b76a;
      --gold: #f79009;
      --red: #f04438;
      --purple: #7a5af8;
      --shadow: 0 12px 30px rgba(16,24,40,.12);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    body { overflow: hidden; }
    .app { position: relative; height: 100vh; height: 100dvh; width: 100vw; overflow: hidden; background: var(--bg); }
    #map { position: absolute; inset: 0; }
    .fab-stack {
      position: absolute;
      right: 14px;
      bottom: calc(330px + var(--safe-bottom));
      z-index: 1000;
      display: grid;
      gap: 10px;
    }
    .fab {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #fff;
      box-shadow: var(--shadow);
      color: var(--text);
      display: grid;
      place-items: center;
      font-size: 18px;
      cursor: pointer;
    }
    .sheet {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1001;
      background: var(--sheet);
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      box-shadow: 0 -12px 30px rgba(16,24,40,.12);
      padding: 8px 12px calc(12px + var(--safe-bottom));
      max-height: min(72vh, 760px);
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }
    .handle {
      width: 40px;
      height: 5px;
      border-radius: 999px;
      background: #d0d5dd;
      margin: 0 auto 10px;
    }
    .title-row {
      display: grid;
      grid-template-columns: minmax(0,1fr) auto;
      gap: 12px;
      align-items: start;
    }
    .eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 4px;
    }
    h1 { margin: 0; font-size: 22px; line-height: 1.1; }
    .sub { margin-top: 6px; color: var(--muted); font-size: 14px; line-height: 1.4; }
    .segmented {
      display: flex;
      gap: 6px;
      overflow: auto;
      padding: 12px 0 4px;
    }
    .seg-btn {
      border: 1px solid #d0d5dd;
      background: #fff;
      color: var(--text);
      border-radius: 999px;
      padding: 9px 12px;
      white-space: nowrap;
      font-size: 13px;
      cursor: pointer;
    }
    .seg-btn.active { border-color: #84caff; background: #eff8ff; color: var(--blue); }
    .town-strip {
      display: flex;
      gap: 8px;
      overflow: auto;
      padding: 12px 0 6px;
    }
    .town-pill {
      border: 1px solid #d0d5dd;
      background: #fff;
      border-radius: 999px;
      padding: 9px 12px;
      white-space: nowrap;
      font-size: 13px;
    }
    .fact-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .fact {
      border: 1px solid #eaecf0;
      border-radius: 16px;
      padding: 12px;
      background: #fff;
    }
    .fact .k {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .fact .v {
      font-size: 14px;
      line-height: 1.4;
    }
    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .action {
      display: block;
      border-radius: 14px;
      padding: 12px;
      border: 1px solid #d0d5dd;
      background: #fff;
      text-decoration: none;
      color: var(--text);
    }
    .action.primary { background: #eff8ff; border-color: #b2ddff; }
    .action strong { display: block; font-size: 14px; margin-bottom: 4px; }
    .action span { display: block; font-size: 12px; color: var(--muted); line-height: 1.35; }
    .section-title {
      margin-top: 16px;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }
    .list-card {
      border: 1px solid #eaecf0;
      border-radius: 16px;
      background: #fff;
      overflow: hidden;
    }
    .region-row {
      padding: 13px 14px;
      cursor: pointer;
      border-top: 1px solid #f2f4f7;
    }
    .region-row:first-child { border-top: none; }
    .region-row.active { background: #f5faff; }
    .region-row h3 { margin: 0 0 4px; font-size: 15px; }
    .region-row p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.35; }
    .bullets {
      margin: 10px 0 0 18px;
      padding: 0;
      color: var(--muted);
    }
    .bullets li { margin: 6px 0; line-height: 1.4; }
    .meta-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .meta-chip {
      border-radius: 999px;
      padding: 7px 10px;
      background: #f2f4f7;
      color: var(--muted);
      font-size: 12px;
    }
    @media (max-width: 640px) {
      .fact-grid, .actions { grid-template-columns: 1fr; }
      h1 { font-size: 20px; }
      .sheet { max-height: 76vh; }
      .fab-stack { bottom: calc(360px + var(--safe-bottom)); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="map"></div>

    <div class="fab-stack">
      <button class="fab" id="locateBtn" aria-label="Reset map">⌖</button>
    </div>

    <section class="sheet" id="sheet">
      <div class="handle"></div>
      <div class="title-row">
        <div>
          <div class="eyebrow" id="eyebrow">Top region</div>
          <h1 id="title">Loading…</h1>
          <div class="sub" id="sub">Loading region details.</div>
        </div>
        <div class="meta-chips" id="chips"></div>
      </div>

      <div class="segmented" id="filters"></div>
      <div class="town-strip" id="towns"></div>

      <div class="fact-grid" id="facts"></div>
      <div class="actions" id="actions"></div>

      <div class="section-title">Why it belongs on the board</div>
      <ul class="bullets" id="bullets"></ul>

      <div class="section-title">Regions</div>
      <div class="list-card" id="regionList"></div>
    </section>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const office = { lat: 40.7527, lng: -73.9992 };
    const regions = [
      {
        id: 'nj-midtown-direct', name: 'NJ Midtown Direct Core', type: 'ground', tier: 'Best pure commute', color: '#2e90fa',
        polygon: [[40.80,-74.48],[40.78,-74.24],[40.62,-74.20],[40.61,-74.42]],
        towns: ['Summit', 'Chatham', 'Madison', 'Millburn / Short Hills'],
        summary: 'Best office execution for Penn-area work, with strong family towns and strong public schools.',
        facts: {
          school: 'Public-school confidence is high enough that private school should be optional, not assumed.',
          commute: 'Direct Penn access is the big win. Least friction for your exact office.',
          housing: 'Expensive, but still more rational than top coastal CT. Good detached-family-home stock.',
          lifestyle: 'Not the dreamiest region, but maybe the best pure life-mechanics answer.'
        },
        why: ['Most rational all-around relocation answer if the job remains important.', 'Great match between office geometry and daily family reality.', 'Should stay near the very top unless water/lifestyle becomes the deciding factor.'],
        links: [
          { title: 'Search homes in Summit', note: '4+ bed / 3+ bath', url: 'https://www.zillow.com/homes/for_rent/Summit,-NJ/4-_beds/3-_baths/' },
          { title: 'Search homes in Chatham', note: 'Family-stock price reality', url: 'https://www.redfin.com/city/3501/NJ/Chatham/filter/min-beds=4,min-baths=3,property-type=house+townhouse' }
        ],
        chips: ['Ground', 'Direct Penn', 'Public-school strong']
      },
      {
        id: 'nassau-port-washington', name: 'North Shore Nassau / Port Washington Branch', type: 'ground', tier: 'Best commute + charm mix', color: '#7a5af8',
        polygon: [[40.86,-73.82],[40.86,-73.60],[40.73,-73.58],[40.72,-73.80]],
        towns: ['Manhasset', 'Plandome', 'Port Washington', 'Sands Point'],
        summary: 'Direct Penn access with better water-adjacent charm and stronger lifestyle upside than the NJ rail answer.',
        facts: {
          school: 'Manhasset is especially strong. Port Washington is good and more attainable.',
          commute: 'One of the best Penn-oriented commute structures on the whole board.',
          housing: 'Premium quickly, but Port Washington may be the most realistic entry point.',
          lifestyle: 'Harbor/coastal feel gives this region more emotional pull.'
        },
        why: ['Direct-Penn practicality without giving up all the charm.', 'One of the best balance points between commute and quality of life.', 'Should remain a top relocation conversation.'],
        links: [
          { title: 'Search homes in Port Washington', note: 'Likely best value entry point', url: 'https://www.zillow.com/homes/for_rent/Port-Washington,-NY/4-_beds/3-_baths/' },
          { title: 'Search homes in Manhasset', note: 'Premium side of the market', url: 'https://www.redfin.com/city/11371/NY/Manhasset/filter/min-beds=4,min-baths=3,property-type=house+townhouse' }
        ],
        chips: ['Ground', 'Water upside', 'Penn-friendly']
      },
      {
        id: 'lower-fairfield', name: 'Lower Fairfield Coast, CT', type: 'ground', tier: 'Best premium coastal family life', color: '#f79009',
        polygon: [[41.12,-73.73],[41.11,-73.35],[40.95,-73.34],[40.95,-73.70]],
        towns: ['Darien', 'Westport', 'Greenwich'],
        summary: 'Elite family product and coastal life, with a commute tax because Grand Central is not Penn.',
        facts: {
          school: 'Schools are elite and one of the main reasons to pay the premium.',
          commute: 'Good enough for 2 to 3 days a week, but less elegant than direct Penn lines.',
          housing: 'Premium to ultra-premium family product.',
          lifestyle: 'This is one of the prettiest and most polished family regions on the board.'
        },
        why: ['A real contender when family quality outranks commute purity.', 'Darien feels especially clean. Westport may be the most complete lifestyle town.', 'Should stay high for the premium-coastal lane.'],
        links: [
          { title: 'Search homes in Darien', note: 'Premium coastal family stock', url: 'https://www.zillow.com/homes/for_rent/Darien,-CT/4-_beds/3-_baths/' },
          { title: 'Search homes in Westport', note: 'Lifestyle-premium market', url: 'https://www.redfin.com/city/21455/CT/Westport/filter/min-beds=4,min-baths=3,property-type=house+townhouse' }
        ],
        chips: ['Ground', 'Coastal', 'Elite schools']
      },
      {
        id: 'westchester-villages', name: 'Westchester Villages', type: 'ground', tier: 'Excellent but secondary for this office', color: '#f04438',
        polygon: [[41.12,-73.95],[41.11,-73.63],[40.92,-73.64],[40.92,-73.94]],
        towns: ['Scarsdale', 'Bronxville', 'Rye', 'Larchmont'],
        summary: 'Excellent family towns and schools, but a worse fit for a Penn-area office than the direct-Penn regions.',
        facts: {
          school: 'School quality is elite. That is not the problem.',
          commute: 'Grand Central orientation is the tax for this specific office.',
          housing: 'High to very high, with less value than many hope.',
          lifestyle: 'Still a classic strong-family region, especially in the best villages.'
        },
        why: ['Needs to stay visible because the family case is real.', 'Likely secondary unless office cadence stays lighter than feared.', 'A good region, just slightly wrong geometry.'],
        links: [
          { title: 'Search homes in Rye', note: 'Shoreline-leaning Westchester lens', url: 'https://www.zillow.com/homes/for_rent/Rye,-NY/4-_beds/3-_baths/' },
          { title: 'Search homes in Scarsdale', note: 'School-premium market', url: 'https://www.redfin.com/city/17669/NY/Scarsdale/filter/min-beds=4,min-baths=3,property-type=house+townhouse' }
        ],
        chips: ['Ground', 'Secondary', 'Great schools']
      },
      {
        id: 'bna-home-base', name: 'Stay in Tennessee, fly from BNA', type: 'flight', tier: 'Baseline fly-in bridge', color: '#12b76a',
        polygon: [[36.29,-86.97],[36.29,-86.46],[35.96,-86.46],[35.96,-86.97]],
        towns: ['College Grove / Franklin', 'BNA', 'Nashville support orbit'],
        summary: 'The control scenario. If a relocation hub is not clearly better than this, it probably should not survive.',
        facts: {
          school: 'No forced family disruption if this is temporary.',
          commute: 'Current baseline is about 2h15m and around $139 one-way on a good nonstop pattern.',
          housing: 'No new housing spend if you keep the farm as home base.',
          lifestyle: 'Best for continuity, hardest on your body and mind.'
        },
        why: ['Must remain on the board as the baseline.', 'Protects family continuity while preserving current compensation.', 'Every fly-in hub should be compared directly against this.'],
        links: [
          { title: 'Check BNA to NYC flights', note: 'Baseline route logic', url: 'https://www.google.com/travel/flights/flights-from-nashville-to-new-york.html?gl=US&hl=en-US' },
          { title: 'Search hotels near Penn', note: 'For Monday/Tuesday overnights', url: 'https://www.google.com/travel/hotels/New%20York%20Penn%20Station' }
        ],
        chips: ['Flight', 'Baseline', 'No move']
      },
      {
        id: 'boston-coast', name: 'Boston Coastal Hub', type: 'flight', tier: 'Best fly-in hub', color: '#12b76a',
        polygon: [[42.55,-71.30],[42.55,-70.65],[42.10,-70.65],[42.10,-71.30]],
        towns: ['Hingham', 'Cohasset', 'Marblehead', 'Manchester-by-the-Sea'],
        summary: 'One of the strongest fly-in answers if you want elite schools, real coastal life, and a dense flight corridor into NYC.',
        facts: {
          school: 'Very strong public-school environment, with private backup if ever desired.',
          commute: 'This is a real business-travel corridor, not a fringe airport gamble.',
          housing: 'Expensive, but the quality is real.',
          lifestyle: 'Big coastal upside. One of the prettiest serious fly-in answers.'
        },
        why: ['Very strong blend of school confidence, family quality, and travel redundancy.', 'Feels like a real place to live, not just a commuter hack.', 'Should stay near the top of the fly-in board.'],
        links: [
          { title: 'Search homes in Hingham', note: 'South Shore family stock', url: 'https://www.zillow.com/homes/for_rent/Hingham,-MA/4-_beds/3-_baths/' },
          { title: 'Search homes in Marblehead', note: 'North Shore coastal lens', url: 'https://www.redfin.com/city/11138/MA/Marblehead/filter/min-beds=4,min-baths=3,property-type=house+townhouse' }
        ],
        chips: ['Flight', 'Coastal', 'Strong schools']
      },
      {
        id: 'chesapeake-bwi', name: 'Annapolis / Chesapeake via BWI', type: 'flight', tier: 'Most practical fly-in water region', color: '#12b76a',
        polygon: [[39.18,-76.86],[39.18,-76.28],[38.82,-76.28],[38.82,-76.86]],
        towns: ['Annapolis', 'Severna Park', 'Arnold', 'Davidsonville'],
        summary: 'Strong family region with water, good school confidence, and practical air/rail flexibility.',
        facts: {
          school: 'Good to very good school signal, especially in stronger suburban pockets.',
          commute: 'More resilient than pure small-airport fly-in strategies.',
          housing: 'More flexible than the top coastal premium markets.',
          lifestyle: 'Big Chesapeake upside without requiring a fantasy budget.'
        },
        why: ['One of the best “real life could be good here” fly-in answers.', 'Not as glamorous as coastal New England, but very practical.', 'Deserves serious consideration.'],
        links: [
          { title: 'Search homes in Severna Park', note: 'Family-market lens', url: 'https://www.zillow.com/homes/for_rent/Severna-Park,-MD/4-_beds/3-_baths/' },
          { title: 'Search homes in Annapolis', note: 'Water lifestyle view', url: 'https://www.redfin.com/city/806/MD/Annapolis/filter/min-beds=4,min-baths=3,property-type=house+townhouse' }
        ],
        chips: ['Flight', 'Bay life', 'Practical']
      }
    ];

    const filters = [
      { id: 'all', label: 'All' },
      { id: 'ground', label: 'Ground' },
      { id: 'flight', label: 'Fly-in' },
      { id: 'top', label: 'Top tier' }
    ];

    const map = L.map('map', { zoomControl: false }).setView([40.8, -74.2], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    L.control.zoom({ position: 'topright' }).addTo(map);

    L.circleMarker([office.lat, office.lng], {
      radius: 7,
      color: '#ffffff',
      weight: 2,
      fillColor: '#2e90fa',
      fillOpacity: 1
    }).addTo(map);

    let activeFilter = 'all';
    let activeRegion = null;
    const layers = {};

    const filtersEl = document.getElementById('filters');
    const townsEl = document.getElementById('towns');
    const factsEl = document.getElementById('facts');
    const actionsEl = document.getElementById('actions');
    const bulletsEl = document.getElementById('bullets');
    const regionListEl = document.getElementById('regionList');
    const eyebrowEl = document.getElementById('eyebrow');
    const titleEl = document.getElementById('title');
    const subEl = document.getElementById('sub');
    const chipsEl = document.getElementById('chips');

    function filteredRegions() {
      return regions.filter(r => {
        if (activeFilter === 'all') return true;
        if (activeFilter === 'ground') return r.type === 'ground';
        if (activeFilter === 'flight') return r.type === 'flight';
        if (activeFilter === 'top') return /Best|Top|Most practical/.test(r.tier);
        return true;
      });
    }

    function renderFilters() {
      filtersEl.innerHTML = '';
      filters.forEach(f => {
        const btn = document.createElement('button');
        btn.className = 'seg-btn' + (f.id === activeFilter ? ' active' : '');
        btn.textContent = f.label;
        btn.onclick = () => {
          activeFilter = f.id;
          renderFilters();
          renderRegionList();
          updateVisibility();
          const vis = filteredRegions();
          if (!vis.find(r => activeRegion && r.id === activeRegion.id)) selectRegion(vis[0]?.id);
        };
        filtersEl.appendChild(btn);
      });
    }

    function renderRegionList() {
      regionListEl.innerHTML = filteredRegions().map(r => `
        <div class="region-row ${activeRegion && activeRegion.id === r.id ? 'active' : ''}" data-id="${r.id}">
          <h3>${r.name}</h3>
          <p>${r.summary}</p>
        </div>
      `).join('');
      regionListEl.querySelectorAll('.region-row').forEach(row => {
        row.onclick = () => selectRegion(row.dataset.id, true);
      });
    }

    function updateVisibility() {
      const ids = new Set(filteredRegions().map(r => r.id));
      Object.entries(layers).forEach(([id, layer]) => {
        if (ids.has(id)) layer.addTo(map); else layer.remove();
      });
    }

    function selectRegion(id, fit=false) {
      const region = regions.find(r => r.id === id);
      if (!region) return;
      activeRegion = region;
      renderRegionList();

      eyebrowEl.textContent = region.tier;
      titleEl.textContent = region.name;
      subEl.textContent = region.summary;
      chipsEl.innerHTML = region.chips.map(c => `<span class="meta-chip">${c}</span>`).join('');
      townsEl.innerHTML = region.towns.map(t => `<div class="town-pill">${t}</div>`).join('');
      factsEl.innerHTML = `
        <div class="fact"><div class="k">Schools</div><div class="v">${region.facts.school}</div></div>
        <div class="fact"><div class="k">Commute</div><div class="v">${region.facts.commute}</div></div>
        <div class="fact"><div class="k">Housing</div><div class="v">${region.facts.housing}</div></div>
        <div class="fact"><div class="k">Lifestyle</div><div class="v">${region.facts.lifestyle}</div></div>
      `;
      actionsEl.innerHTML = region.links.map((link, i) => `
        <a class="action ${i===0 ? 'primary' : ''}" href="${link.url}" target="_blank" rel="noopener">
          <strong>${link.title}</strong>
          <span>${link.note}</span>
        </a>
      `).join('');
      bulletsEl.innerHTML = region.why.map(x => `<li>${x}</li>`).join('');

      Object.entries(layers).forEach(([rid, layer]) => {
        const rr = regions.find(r => r.id === rid);
        layer.setStyle({ weight: rid === region.id ? 3 : 1.5, fillOpacity: rid === region.id ? 0.28 : 0.18, color: rr.color, fillColor: rr.color });
      });

      if (fit) map.fitBounds(layers[region.id].getBounds(), { padding: [24,24] });
    }

    regions.forEach(region => {
      const layer = L.polygon(region.polygon.map(([lat,lng]) => [lat,lng]), {
        color: region.color,
        fillColor: region.color,
        fillOpacity: .18,
        weight: 1.5
      }).addTo(map);
      layer.on('click', () => selectRegion(region.id, true));
      layers[region.id] = layer;
    });

    document.getElementById('locateBtn').onclick = () => map.setView([40.8, -74.2], 7);

    renderFilters();
    renderRegionList();
    selectRegion('nj-midtown-direct', true);
  </script>
</body>
</html>
